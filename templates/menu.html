<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ECOLTURA | Administración</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --verde: #2E6B3E; --blanco: #FFFFFF; --crema: #F8F9F7;
      --carbon: #1A1A1A; --gris: #6B7280;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: var(--crema); color: var(--carbon); height: 100vh; }

    /* Intro Profesional */
    #intro {
      position: fixed; inset: 0; z-index: 2000;
      background: var(--blanco); display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      transition: opacity 0.8s ease;
    }
    #intro.hide { opacity: 0; pointer-events: none; }
    #intro img { width: 220px; margin-bottom: 24px; }
    #intro h2 { font-size: 1.1rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--gris); font-weight: 500; }

    /* Layout */
    .shell { display: grid; grid-template-rows: auto 1fr; height: 100vh; }
    .topbar { background: var(--blanco); padding: 20px 40px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #eee; }
    .topbar img { height: 30px; }
    
    /* Grid Adaptativo */
    .modulos {
      display: grid; padding: 40px; gap: 24px;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      align-content: start; overflow-y: auto;
    }
    .modulo {
      background: white; border-radius: 24px; padding: 40px;
      display: flex; flex-direction: column; align-items: center; gap: 16px;
      text-decoration: none; border: 1px solid rgba(0,0,0,0.05);
      transition: all 0.3s ease;
    }
    .modulo:hover { transform: translateY(-8px); box-shadow: 0 20px 40px rgba(0,0,0,0.08); }
    .mod-nombre { font-size: 1.25rem; font-weight: 700; color: var(--carbon); }
    .mod-tag { font-size: 0.8rem; color: var(--verde); font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; }

    @media (max-width: 600px) { .modulos { padding: 20px; } }
  </style>
</head>
<body>

<div id="intro">
  <img src="/static/img/ecoltura-logo.png" alt="ECOLTURA">
  <h2>Administración</h2>
</div>

<div class="shell">
  <header class="topbar">
    <img src="/static/img/ecoltura-logo.png" alt="Logo">
    <span style="font-weight: 800;">ECOLTURA</span>
  </header>

  <main class="modulos">
    <a href="/clientes" class="modulo">
      <i class="bi bi-people" style="font-size: 3rem; color: var(--verde);"></i>
      <div style="text-align:center">
        <div class="mod-nombre">Clientes</div>
        <div class="mod-tag">Gestión</div>
      </div>
    </a>
    <a href="/productos" class="modulo">
      <i class="bi bi-basket3" style="font-size: 3rem; color: var(--verde);"></i>
      <div style="text-align:center">
        <div class="mod-nombre">Productos</div>
        <div class="mod-tag">Catálogo</div>
      </div>
    </a>
    <a href="/inventario" class="modulo">
      <i class="bi bi-box-seam" style="font-size: 3rem; color: var(--verde);"></i>
      <div style="text-align:center">
        <div class="mod-nombre">Inventario</div>
        <div class="mod-tag">Stock</div>
      </div>
    </a>
    <a href="/ventas" class="modulo">
      <i class="bi bi-receipt-cutoff" style="font-size: 3rem; color: var(--verde);"></i>
      <div style="text-align:center">
        <div class="mod-nombre">Ventas</div>
        <div class="mod-tag">Facturación</div>
      </div>
    </a>
    <a href="/admin/pedidos" class="modulo">
      <i class="bi bi-bag-check" style="font-size: 3rem; color: var(--verde);"></i>
      <div style="text-align:center">
        <div class="mod-nombre">Pedidos Web</div>
        <div class="mod-tag">Bandeja</div>
      </div>
    </a>
    <a href="/admin/visitas" class="modulo">
      <i class="bi bi-calendar2-check" style="font-size: 3rem; color: var(--verde);"></i>
      <div style="text-align:center">
        <div class="mod-nombre">Visitas</div>
        <div class="mod-tag">Finca</div>
      </div>
    </a>
  </main>
</div>

<script>
  setTimeout(() => document.getElementById('intro').classList.add('hide'), 1500);
</script>
</body>
</html>
