<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>ECOLTURA | Administración</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --verde:    #2E6B3E;
      --verde-os: #1A4226;
      --lima:     #7AB648;
      --crema:    #F4F7F0;
      --blanco:   #FFFFFF;
      --carbon:   #1C1C1E;
      --gris:     #6B7280;
      --borde:    rgba(46,107,62,.1);
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--crema);
      color: var(--carbon);
      min-height: 100vh;
      min-height: 100dvh;               /* móvil: altura real sin barra de URL */
      display: flex; flex-direction: column;
      -webkit-font-smoothing: antialiased;
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }

    /* ── INTRO ── */
    #intro {
      position: fixed; inset: 0; z-index: 2000;
      background: var(--verde-os);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 18px;
      transition: opacity .7s ease, visibility .7s ease;
    }
    #intro.hide { opacity: 0; visibility: hidden; pointer-events: none; }
    .intro-marca {
      font-weight: 800; color: #fff;
      font-size: clamp(2.2rem, 9vw, 4rem);
      letter-spacing: clamp(8px, 2.5vw, 18px); text-indent: 8px;
      opacity: 0; transform: translateY(10px) scale(.96);
      transition: opacity .8s ease .15s, transform .8s ease .15s;
    }
    #intro.show .intro-marca { opacity: 1; transform: translateY(0) scale(1); }
    .intro-linea {
      width: 0; height: 2px; background: var(--lima);
      transition: width .7s ease .6s;
    }
    #intro.show .intro-linea { width: 56px; }
    .intro-sub {
      font-size: clamp(.6rem, 2.5vw, .72rem); letter-spacing: 4px;
      text-transform: uppercase; color: rgba(255,255,255,.55); font-weight: 600;
      opacity: 0; transition: opacity .6s ease .9s;
    }
    #intro.show .intro-sub { opacity: 1; }

    /* ── TOPBAR ── */
    .topbar {
      background: var(--blanco);
      border-bottom: 2px solid var(--lima);
      display: flex; align-items: center; justify-content: space-between;
      padding: clamp(12px, 2vw, 18px) clamp(18px, 4vw, 36px);
      flex-shrink: 0;
    }
    .brand { display: flex; align-items: center; gap: 12px; text-decoration: none; }
    .brand img { height: clamp(32px, 4vw, 42px); width: auto; }
    .brand-name {
      font-weight: 800; font-size: clamp(1rem, 2.4vw, 1.3rem);
      letter-spacing: 2.5px; color: var(--verde-os); text-transform: uppercase; line-height: 1;
    }
    .brand-sub {
      display: block; font-size: clamp(.48rem, 1.4vw, .56rem); letter-spacing: 1.5px;
      color: var(--lima); font-weight: 600; text-transform: uppercase; margin-top: 2px;
    }
    .topbar-hora {
      font-size: clamp(.62rem, 1.6vw, .78rem); color: var(--gris);
      font-weight: 500; text-align: right;
    }

    /* ── GRID ── */
    .modulos {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-auto-rows: 1fr;
      gap: clamp(12px, 2vw, 22px);
      padding: clamp(16px, 3vw, 32px);
      align-content: stretch;
    }

    .modulo {
      background: var(--blanco);
      border-radius: clamp(14px, 2vw, 22px);
      border: 1.5px solid var(--borde);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: clamp(8px, 1.4vw, 16px);
      text-decoration: none; position: relative; overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,.04);
      transition: transform .22s ease, box-shadow .22s ease, background .22s ease, border-color .22s ease;
      min-height: clamp(120px, 22vh, 220px);
    }
    .modulo::after {
      content: ''; position: absolute; bottom: 0; left: 0; right: 0;
      height: 3px; background: linear-gradient(90deg, var(--verde), var(--lima));
      transform: scaleX(0); transform-origin: left; transition: transform .25s ease;
    }
    .modulo:hover, .modulo:active {
      transform: translateY(-4px);
      box-shadow: 0 14px 32px rgba(46,107,62,.15);
      border-color: rgba(46,107,62,.3);
    }
    .modulo:hover::after { transform: scaleX(1); }
    .modulo:hover .mod-icon { background: var(--verde); }
    .modulo:hover .mod-icon i { color: #fff; }
    .modulo:hover .mod-nombre { color: var(--verde); }

    .mod-icon {
      width: clamp(52px, 8vw, 80px); height: clamp(52px, 8vw, 80px);
      border-radius: clamp(14px, 2vw, 20px);
      background: var(--crema);
      display: flex; align-items: center; justify-content: center;
      transition: background .22s ease;
    }
    .mod-icon i {
      font-size: clamp(1.6rem, 3.5vw, 2.4rem); color: var(--verde);
      transition: color .22s ease; line-height: 1;
    }
    .mod-texto { text-align: center; display: flex; flex-direction: column; gap: 3px; }
    .mod-nombre {
      font-size: clamp(.92rem, 1.8vw, 1.15rem); font-weight: 700;
      color: var(--carbon); letter-spacing: .3px; transition: color .22s ease; line-height: 1.2;
    }
    .mod-tag {
      font-size: clamp(.55rem, 1.2vw, .64rem); color: #9CA3AF;
      text-transform: uppercase; letter-spacing: 1.5px; font-weight: 600; line-height: 1;
    }

    .badge-alert {
      position: absolute; top: 12px; right: 12px;
      background: #EF4444; color: #fff; border-radius: 999px;
      min-width: clamp(20px, 3vw, 24px); height: clamp(20px, 3vw, 24px);
      padding: 0 6px; font-size: clamp(.62rem, 1.4vw, .72rem); font-weight: 700;
      display: none; align-items: center; justify-content: center;
    }
    .badge-alert.on { display: flex; }

    /* ── TABLET ── */
    @media (max-width: 820px) {
      .modulos { grid-template-columns: repeat(2, 1fr); }
      .topbar-hora { display: none; }
    }

    /* ── MÓVIL (iPhone / Android) ── */
    @media (max-width: 540px) {
      body { overflow-y: auto; }
      .modulos {
        grid-template-columns: 1fr;
        grid-auto-rows: auto;
        gap: 12px;
      }
      .modulo {
        flex-direction: row; justify-content: flex-start;
        padding: 16px 20px; gap: 18px; min-height: 0;
        border-radius: 16px;
      }
      .modulo::after { width: 4px; height: 100%; top: 0; bottom: 0; left: 0; right: auto;
                       transform: scaleY(0); transform-origin: top; }
      .modulo:hover::after, .modulo:active::after { transform: scaleY(1); }
      .mod-icon { width: 54px; height: 54px; flex-shrink: 0; }
      .mod-texto { text-align: left; align-items: flex-start; }
    }
  </style>
</head>
<body>

<!-- INTRO -->
<div id="intro">
  <div class="intro-marca">ECOLTURA</div>
  <div class="intro-linea"></div>
  <div class="intro-sub">Administración</div>
</div>

<!-- TOPBAR -->
<header class="topbar">
  <a href="/menu" class="brand">
    <img src="/static/img/ecoltura-logo.png" alt="ECOLTURA">
    <div>
      <span class="brand-name">ECOLTURA</span>
      <span class="brand-sub">Productos Orgánicos &amp; Lácteos</span>
    </div>
  </a>
  <div class="topbar-hora" id="reloj"></div>
</header>

<!-- MÓDULOS -->
<main class="modulos">
  <a href="/clientes" class="modulo">
    <div class="mod-icon"><i class="bi bi-people"></i></div>
    <div class="mod-texto"><div class="mod-nombre">Clientes</div><div class="mod-tag">Gestión</div></div>
  </a>
  <a href="/productos" class="modulo">
    <div class="mod-icon"><i class="bi bi-basket3"></i></div>
    <div class="mod-texto"><div class="mod-nombre">Productos</div><div class="mod-tag">Catálogo</div></div>
  </a>
  <a href="/inventario" class="modulo">
    <div class="mod-icon"><i class="bi bi-box-seam"></i></div>
    <div class="mod-texto"><div class="mod-nombre">Inventario</div><div class="mod-tag">Stock</div></div>
  </a>
  <a href="/ventas" class="modulo">
    <div class="mod-icon"><i class="bi bi-receipt-cutoff"></i></div>
    <div class="mod-texto"><div class="mod-nombre">Ventas</div><div class="mod-tag">Facturación</div></div>
  </a>
  <a href="/admin/pedidos" class="modulo">
    <span class="badge-alert" id="badgePedidos">0</span>
    <div class="mod-icon"><i class="bi bi-bag-check"></i></div>
    <div class="mod-texto"><div class="mod-nombre">Pedidos Web</div><div class="mod-tag">Bandeja</div></div>
  </a>
  <a href="/admin/visitas" class="modulo">
    <span class="badge-alert" id="badgeVisitas">0</span>
    <div class="mod-icon"><i class="bi bi-calendar2-check"></i></div>
    <div class="mod-texto"><div class="mod-nombre">Visitas</div><div class="mod-tag">Finca</div></div>
  </a>
</main>

<script>
  // Intro animada (siempre se muestra, breve)
  var intro = document.getElementById('intro');
  setTimeout(function(){ intro.classList.add('show'); }, 80);
  setTimeout(function(){ intro.classList.add('hide'); }, 1700);

  // Reloj en vivo
  function tick() {
    var n = new Date();
    var f = n.toLocaleDateString('es-CR', { weekday:'long', day:'numeric', month:'long' });
    var h = n.toLocaleTimeString('es-CR', { hour:'2-digit', minute:'2-digit' });
    document.getElementById('reloj').textContent = f.charAt(0).toUpperCase() + f.slice(1) + '  ·  ' + h;
  }
  tick(); setInterval(tick, 30000);

  // Badges de pendientes
  fetch('/admin/api/contadores').then(function(r){ return r.json(); }).then(function(d){
    if (d.pedidos_pendientes > 0) {
      var b = document.getElementById('badgePedidos');
      b.textContent = d.pedidos_pendientes; b.classList.add('on');
    }
    if (d.visitas_pendientes > 0) {
      var v = document.getElementById('badgeVisitas');
      v.textContent = d.visitas_pendientes; v.classList.add('on');
    }
  }).catch(function(){});
</script>
</body>
</html>
