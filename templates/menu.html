<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ECOLTURA | Administración</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root { --verde: #2E6B3E; --crema: #F4F7F0; --blanco: #FFFFFF; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: var(--crema); }

    /* Layout principal */
    .shell { display: flex; flex-direction: column; min-height: 100vh; }
    .topbar { background: var(--blanco); padding: 15px 32px; border-bottom: 2px solid #7AB648; display: flex; align-items: center; }
    
    /* Grid de tarjetas inteligente: se ajusta solo al tamaño de pantalla */
    .modulos {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      padding: 32px;
      flex-grow: 1;
    }

    .modulo {
      background: white;
      padding: 40px;
      border-radius: 20px;
      border: 1px solid rgba(0,0,0,0.05);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 15px;
      text-decoration: none;
      transition: transform 0.2s;
    }
    
    /* Ajuste para PC: Fuentes más grandes */
    @media (min-width: 900px) {
      .mod-nombre { font-size: 1.5rem !important; }
      .mod-tag { font-size: 0.9rem !important; }
      .mod-icon i { font-size: 3.5rem !important; }
    }

    .mod-nombre { font-size: 1.1rem; font-weight: 700; color: #1C1C1E; }
    .mod-tag { font-size: 0.7rem; color: #9CA3AF; text-transform: uppercase; letter-spacing: 2px; }
    .mod-icon i { font-size: 2.5rem; color: var(--verde); }

    /* Badge rojo */
    .badge-alert { background: #EF4444; color: white; border-radius: 50%; width: 22px; height: 22px; display: none; align-items: center; justify-content: center; font-size: 0.7rem; position: absolute; top: 20px; right: 20px; }
    .badge-alert.on { display: flex; }
  </style>
</head>
<body>

<div class="shell">
  <header class="topbar">
    <a href="/menu" style="display:flex; align-items:center; gap:12px; text-decoration:none;">
      <img src="/static/img/ecoltura-logo.png" style="height:38px;">
      <span style="font-weight:800; color:var(--verde);">ECOLTURA</span>
    </a>
  </header>

  <main class="modulos">
    <a href="/clientes" class="modulo">
      <div class="mod-icon"><i class="bi bi-people"></i></div>
      <div style="text-align:center">
        <div class="mod-nombre">Clientes</div>
        <div class="mod-tag">Gestión</div>
      </div>
    </a>
    </main>
</div>
</body>
</html>
