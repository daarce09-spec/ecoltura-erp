<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ECOLTURA | Administración</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="apple-touch-icon" href="/static/img/apple-touch-icon.jpeg">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --verde:    #2E6B3E;
      --verde-os: #1A4226;
      --lima:     #7AB648;
      --crema:    #F4F7F0;
      --blanco:   #FFFFFF;
      --carbon:   #1C1C1E;
      --gris:     #6B7280;
      --borde:    rgba(46,107,62,.1);
    }

    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--crema);
      color: var(--carbon);
      -webkit-font-smoothing: antialiased;
    }

    /* ── INTRO ── */
    #intro {
      position: fixed; inset: 0; z-index: 1000;
      background: var(--verde-os);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 20px;
      transition: opacity .6s ease, visibility .6s ease;
    }
    #intro.hide { opacity: 0; visibility: hidden; pointer-events: none; }
    #intro img {
      height: 90px; width: auto;
      filter: brightness(0) invert(1);
      opacity: 0; transform: scale(.92);
      transition: opacity .8s ease .2s, transform .8s ease .2s;
    }
    #intro.show img { opacity: 1; transform: scale(1); }
    #intro .intro-linea {
      width: 0; height: 2px; background: var(--lima);
      transition: width .8s ease .7s;
    }
    #intro.show .intro-linea { width: 60px; }
    #intro .intro-sub {
      font-size: .65rem; letter-spacing: 4px; text-transform: uppercase;
      color: rgba(255,255,255,.55); font-weight: 600;
      opacity: 0; transition: opacity .6s ease 1s;
    }
    #intro.show .intro-sub { opacity: 1; }

    /* ── SHELL ── */
    .shell {
      height: 100vh;
      display: grid;
      grid-template-rows: 72px 1fr;
      padding: 0;
      overflow: hidden;
    }

    /* ── HEADER ── */
    .topbar {
      background: var(--blanco);
      border-bottom: 2px solid var(--lima);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 32px;
    }
    .topbar-brand { display: flex; align-items: center; gap: 12px; text-decoration: none; }
    .topbar-brand img { height: 38px; width: auto; }
    .topbar-name {
      font-size: 1.05rem; font-weight: 800; letter-spacing: 3.5px;
      color: var(--verde-os); text-transform: uppercase;
    }
    .topbar-sub {
      font-size: .5rem; letter-spacing: 1.5px; color: var(--lima);
      font-weight: 600; text-transform: uppercase; display: block; margin-top: 2px;
    }
    .topbar-hora { font-size: .78rem; color: var(--gris); font-weight: 500; }

    /* ── GRID DE MÓDULOS ── */
    .modulos {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(2, 1fr);
      gap: 20px;
      padding: 24px 32px;
      height: 100%;
    }

    .modulo {
      background: var(--blanco);
      border-radius: 20px;
      border: 1.5px solid var(--borde);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px; text-decoration: none;
      position: relative; overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,.04);
      transition: transform .2s ease, box-shadow .2s ease, background .2s ease, border-color .2s ease;
    }
    .modulo::after {
      content: ''; position: absolute; bottom: 0; left: 0; right: 0;
      height: 3px; background: linear-gradient(90deg, var(--verde), var(--lima));
      transform: scaleX(0); transform-origin: left; transition: transform .25s ease;
    }
    .modulo:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 32px rgba(46,107,62,.14);
      border-color: rgba(46,107,62,.25);
    }
    .modulo:hover::after { transform: scaleX(1); }
    .modulo:hover .mod-icon { background: var(--verde); }
    .modulo:hover .mod-icon i { color: white; }
    .modulo:hover .mod-nombre { color: var(--verde); }

    .mod-icon {
      width: 72px; height: 72px; border-radius: 20px;
      background: var(--crema);
      display: flex; align-items: center; justify-content: center;
      transition: background .2s ease;
    }
    .mod-icon i { font-size: 2rem; color: var(--verde); transition: color .2s ease; }

    .mod-nombre {
      font-size: 1rem; font-weight: 700; color: var(--carbon);
      letter-spacing: .3px; transition: color .2s ease;
    }
    .mod-tag {
      font-size: .6rem; color: #9CA3AF; text-transform: uppercase;
      letter-spacing: 1.5px; font-weight: 600; margin-top: -10px;
    }

    .badge-alert {
      position: absolute; top: 14px; right: 14px;
      background: #EF4444; color: white;
      border-radius: 999px; min-width: 22px; height: 22px;
      padding: 0 6px; font-size: .7rem; font-weight: 700;
      display: none; align-items: center; justify-content: center;
    }
    .badge-alert.on { display: flex; }

    /* Responsive */
    @media (max-width: 900px) {
      html, body { overflow: auto; }
      .shell { height: auto; grid-template-rows: 64px auto; overflow: visible; }
      .modulos { grid-template-columns: repeat(2, 1fr); grid-template-rows: auto; padding: 16px; gap: 14px; }
      .topbar { padding: 0 16px; }
    }
    @media (max-width: 520px) {
      .modulos { grid-template-columns: 1fr; }
      .modulo { flex-direction: row; justify-content: flex-start; padding: 16px 20px; gap: 16px; border-radius: 14px; min-height: 80px; }
      .modulo::after { width: 3px; height: 100%; bottom: 0; left: 0; right: auto; transform: scaleY(0); transform-origin: bottom; }
      .modulo:hover::after { transform: scaleY(1); }
      .mod-icon { width: 52px; height: 52px; flex-shrink: 0; border-radius: 14px; }
      .mod-icon i { font-size: 1.6rem; }
      .mod-nombre { font-size: .95rem; }
      .mod-info { text-align: left; }
    }
  </style>
</head>
<body>

<!-- INTRO -->
<div id="intro">
  <img src="/static/img/ecoltura-logo.png" alt="ECOLTURA">
  <div class="intro-linea"></div>
  <div class="intro-sub">Administración</div>
</div>

<div class="shell">

  <!-- TOPBAR -->
  <header class="topbar">
    <a class="topbar-brand" href="/menu">
      <img src="/static/img/ecoltura-logo.png" alt="ECOLTURA">
      <div>
        <span class="topbar-name">ECOLTURA</span>
        <span class="topbar-sub">Productos Orgánicos &amp; Lácteos</span>
      </div>
    </a>
    <div class="topbar-hora" id="reloj"></div>
  </header>

  <!-- MÓDULOS -->
  <main class="modulos">

    <a href="/clientes" class="modulo">
      <div class="mod-icon"><i class="bi bi-people"></i></div>
      <div class="mod-info" style="text-align:center">
        <div class="mod-nombre">Clientes</div>
        <div class="mod-tag">Gestión</div>
      </div>
    </a>

    <a href="/productos" class="modulo">
      <div class="mod-icon"><i class="bi bi-basket3"></i></div>
      <div class="mod-info" style="text-align:center">
        <div class="mod-nombre">Productos</div>
        <div class="mod-tag">Catálogo</div>
      </div>
    </a>

    <a href="/inventario" class="modulo">
      <div class="mod-icon"><i class="bi bi-box-seam"></i></div>
      <div class="mod-info" style="text-align:center">
        <div class="mod-nombre">Inventario</div>
        <div class="mod-tag">Stock</div>
      </div>
    </a>

    <a href="/ventas" class="modulo">
      <div class="mod-icon"><i class="bi bi-receipt-cutoff"></i></div>
      <div class="mod-info" style="text-align:center">
        <div class="mod-nombre">Ventas</div>
        <div class="mod-tag">Facturación</div>
      </div>
    </a>

    <a href="/admin/pedidos" class="modulo">
      <span class="badge-alert" id="badgePedidos">0</span>
      <div class="mod-icon"><i class="bi bi-bag-check"></i></div>
      <div class="mod-info" style="text-align:center">
        <div class="mod-nombre">Pedidos Web</div>
        <div class="mod-tag">Bandeja</div>
      </div>
    </a>

    <a href="/admin/visitas" class="modulo">
      <span class="badge-alert" id="badgeVisitas">0</span>
      <div class="mod-icon"><i class="bi bi-calendar2-check"></i></div>
      <div class="mod-info" style="text-align:center">
        <div class="mod-nombre">Visitas</div>
        <div class="mod-tag">Finca</div>
      </div>
    </a>

  </main>
</div>

<script>
  // Intro
  const intro = document.getElementById('intro');
  setTimeout(() => intro.classList.add('show'), 80);
  setTimeout(() => intro.classList.add('hide'), 1800);

  // Reloj
  function tick() {
    const now = new Date();
    document.getElementById('reloj').textContent =
      now.toLocaleDateString('es-CR', { weekday:'long', day:'numeric', month:'long' }) + '  ' +
      now.toLocaleTimeString('es-CR', { hour:'2-digit', minute:'2-digit' });
  }
  tick(); setInterval(tick, 1000);

  // Badges
  (async () => {
    try {
      const d = await fetch('/admin/api/contadores').then(r => r.json());
      if (d.pedidos_pendientes > 0) {
        const b = document.getElementById('badgePedidos');
        b.textContent = d.pedidos_pendientes; b.classList.add('on');
      }
      if (d.visitas_pendientes > 0) {
        const b = document.getElementById('badgeVisitas');
        b.textContent = d.visitas_pendientes; b.classList.add('on');
      }
    } catch(e) {}
  })();
</script>
</body>
</html>
