<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ECOLTURA | Administración</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --verde: #2E6B3E; --blanco: #FFFFFF; --crema: #F8F9F7;
      --carbon: #1A1A1A; --gris: #6B7280; --shadow: 0 4px 20px rgba(0,0,0,0.06);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: var(--crema); color: var(--carbon); }

    /* Intro Profesional */
    #intro { position: fixed; inset: 0; z-index: 2000; background: var(--blanco); display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.8s ease; }
    #intro.hide { opacity: 0; pointer-events: none; }
    #intro img { width: 240px; margin-bottom: 24px; }
    #intro h2 { font-size: 1.1rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--gris); font-weight: 500; }

    /* Layout Profesional */
    .shell { display: grid; grid-template-rows: 80px 1fr; height: 100vh; }
    .topbar { background: var(--blanco); padding: 0 40px; display: flex; align-items: center; border-bottom: 2px solid var(--verde); box-shadow: var(--shadow); }
    .brand-link { display: flex; align-items: center; gap: 16px; text-decoration: none; color: inherit; }
    .brand-link img { height: 45px; width: auto; }
    .brand-name { font-weight: 800; font-size: 1.2rem; color: var(--verde); letter-spacing: -0.5px; }

    /* Grid Moderno */
    .modulos { display: grid; padding: 40px; gap: 24px; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); align-content: start; }
    .modulo { background: white; border-radius: 24px; padding: 40px; display: flex; flex-direction: column; align-items: center; gap: 20px; text-decoration: none; border: 1px solid rgba(0,0,0,0.04); transition: transform 0.3s ease, box-shadow 0.3s ease; position: relative; }
    .modulo:hover { transform: translateY(-8px); box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
    .mod-nombre { font-size: 1.2rem; font-weight: 700; color: var(--carbon); }
    .mod-tag { font-size: 0.75rem; color: var(--verde); font-weight: 700; text-transform: uppercase; letter-spacing: 0.15em; }

    /* Notificación Pro */
    .badge-alert { position: absolute; top: 20px; right: 20px; background: #DC2626; color: white; width: 24px; height: 24px; border-radius: 50%; font-size: 0.7rem; font-weight: 800; display: none; align-items: center; justify-content: center; box-shadow: 0 4px 6px -1px rgba(220, 38, 38, 0.3); }
    .badge-alert.on { display: flex; }
  </style>
</head>
<body>

<div id="intro">
  <img src="/static/img/ecoltura-logo.png" alt="ECOLTURA">
  <h2>Administración</h2>
</div>

<div class="shell">
  <header class="topbar">
    <a class="brand-link" href="/menu">
      <img src="/static/img/ecoltura-logo.png" alt="Logo">
      <span class="brand-name">ECOLTURA</span>
    </a>
  </header>

  <main class="modulos">
    <a href="/admin/pedidos" class="modulo">
      <span class="badge-alert" id="badgePedidos">!</span>
      <i class="bi bi-bag-check" style="font-size: 3rem; color: var(--verde);"></i>
      <div style="text-align:center">
        <div class="mod-nombre">Pedidos Web</div>
        <div class="mod-tag">Gestión</div>
      </div>
    </a>
    </main>
</div>

<script>
  setTimeout(() => document.getElementById('intro').classList.add('hide'), 1500);
  // Logica de badges permanece igual
</script>
</body>
</html>
