<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ECOLTURA | Administración</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --verde: #2E6B3E;
      --verde-os: #1A4226;
      --lima: #7AB648;
      --crema: #F4F7F0;
      --blanco: #FFFFFF;
      --carbon: #1C1C1E;
      --borde: rgba(46,107,62,.15);
    }
    
    body { font-family: 'Inter', sans-serif; background: var(--crema); margin: 0; color: var(--carbon); }

    /* --- INTRO MEJORADO --- */
    #intro {
      position: fixed; inset: 0; z-index: 1000; background: var(--verde-os);
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px;
      transition: opacity .6s ease, visibility .6s ease;
    }
    #intro.hide { opacity: 0; visibility: hidden; }
    #intro .intro-sub { color: rgba(255,255,255,.8); letter-spacing: 4px; text-transform: uppercase; font-size: 0.8rem; }

    /* --- LAYOUT --- */
    .shell { display: grid; grid-template-rows: 72px 1fr; height: 100vh; }
    .topbar { background: var(--blanco); border-bottom: 2px solid var(--lima); display: flex; align-items: center; justify-content: space-between; padding: 0 32px; }
    
    /* --- MÓDULOS --- */
    .modulos { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; padding: 32px; max-width: 1200px; margin: 0 auto; width: 100%; }
    .modulo {
      background: var(--blanco); border-radius: 24px; border: 1px solid var(--borde);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 12px; text-decoration: none; padding: 32px; cursor: pointer;
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.3s ease;
    }
    .modulo:hover { transform: translateY(-8px); box-shadow: 0 20px 40px rgba(0,0,0,0.08); }
    .mod-icon { width: 64px; height: 64px; background: var(--crema); border-radius: 16px; display: flex; align-items: center; justify-content: center; }
    .mod-icon i { font-size: 1.8rem; color: var(--verde); }
    .mod-nombre { font-weight: 700; color: var(--carbon); }
    .mod-tag { font-size: 0.75rem; color: #6B7280; text-transform: uppercase; letter-spacing: 1px; }

    /* --- BADGE --- */
    .badge-alert {
      position: absolute; top: 20px; right: 20px; background: #EF4444; color: white;
      border-radius: 20px; padding: 2px 10px; font-size: 0.75rem; font-weight: 700; display: none;
    }
    .badge-alert.on { display: block; }

    @media (max-width: 768px) {
      .modulos { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 520px) {
      .modulos { grid-template-columns: 1fr; padding: 16px; }
      .modulo { flex-direction: row; justify-content: flex-start; padding: 20px; }
    }
  </style>
</head>
<body>

<div id="intro">
  <div style="color: white; font-size: 2rem; font-weight: 800;">ECOLTURA</div>
  <div class="intro-sub">Administración</div>
</div>

<div class="shell">
  <header class="topbar">
    <div style="font-weight: 800; color: var(--verde-os);">ECOLTURA</div>
    <div id="reloj" style="font-size: 0.85rem; color: #6B7280;"></div>
  </header>

  <main class="modulos">
    <a href="/clientes" class="modulo">
      <div class="mod-icon"><i class="bi bi-people"></i></div>
      <div><div class="mod-nombre">Clientes</div><div class="mod-tag">Gestión</div></div>
    </a>
    <a href="/productos" class="modulo">
      <div class="mod-icon"><i class="bi bi-basket3"></i></div>
      <div><div class="mod-nombre">Productos</div><div class="mod-tag">Catálogo</div></div>
    </a>
    <a href="/inventario" class="modulo">
      <div class="mod-icon"><i class="bi bi-box-seam"></i></div>
      <div><div class="mod-nombre">Inventario</div><div class="mod-tag">Stock</div></div>
    </a>
    <a href="/ventas" class="modulo">
      <div class="mod-icon"><i class="bi bi-receipt-cutoff"></i></div>
      <div><div class="mod-nombre">Ventas</div><div class="mod-tag">Facturación</div></div>
    </a>
    <a href="/admin/pedidos" class="modulo" style="position: relative;">
      <span class="badge-alert" id="badgePedidos">0</span>
      <div class="mod-icon"><i class="bi bi-bag-check"></i></div>
      <div><div class="mod-nombre">Pedidos Web</div><div class="mod-tag">Bandeja</div></div>
    </a>
    <a href="/admin/visitas" class="modulo" style="position: relative;">
      <span class="badge-alert" id="badgeVisitas">0</span>
      <div class="mod-icon"><i class="bi bi-calendar2-check"></i></div>
      <div><div class="mod-nombre">Visitas</div><div class="mod-tag">Finca</div></div>
    </a>
  </main>
</div>

<script>
  // Intro animation
  setTimeout(() => document.getElementById('intro').classList.add('hide'), 1500);

  // Clock
  function updateTime() {
    document.getElementById('reloj').textContent = new Date().toLocaleDateString('es-CR', { dateStyle: 'medium' }) + ' ' + new Date().toLocaleTimeString('es-CR', { timeStyle: 'short' });
  }
  setInterval(updateTime, 1000); updateTime();

  // Badges update
  (async () => {
    try {
      const res = await fetch('/admin/api/contadores');
      const data = await res.json();
      if (data.pedidos_pendientes > 0) {
        const b = document.getElementById('badgePedidos');
        b.textContent = data.pedidos_pendientes; b.classList.add('on');
      }
      if (data.visitas_pendientes > 0) {
        const b = document.getElementById('badgeVisitas');
        b.textContent = data.visitas_pendientes; b.classList.add('on');
      }
    } catch(e) { console.error("Error al cargar contadores"); }
  })();
</script>
</body>
</html>
