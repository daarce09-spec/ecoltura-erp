<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ECOLTURA | Administración</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    :root { --verde-os: #1A4226; --blanco: #FFFFFF; --lima: #7AB648; --carbon: #1C1C1E; --crema: #F4F7F0; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: var(--crema); color: var(--carbon); min-height: 100vh; display: flex; flex-direction: column; }

    /* INTRO */
    #intro { position: fixed; inset: 0; z-index: 2000; background: var(--blanco); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; transition: opacity 0.8s ease; padding: 20px; text-align: center; }
    #intro.hide { opacity: 0; pointer-events: none; }
    #intro img { width: clamp(150px, 20vw, 250px); }
    #intro h1 { font-size: clamp(1.2rem, 3vw, 2rem); font-weight: 800; color: var(--verde-os); text-transform: uppercase; }

    /* BARRA SUPERIOR */
    .topbar { background: var(--blanco); padding: clamp(15px, 2vw, 25px) clamp(20px, 4vw, 40px); border-bottom: 2px solid var(--lima); display: flex; align-items: center; }
    .brand { display: flex; align-items: center; gap: 15px; text-decoration: none; }
    .brand img { height: clamp(30px, 3vw, 45px); }
    .brand span { font-weight: 800; font-size: clamp(1rem, 2vw, 1.5rem); color: var(--verde-os); }

    /* GRID ESCALABLE - La magia ocurre aquí */
    .modulos { 
      display: grid; 
      padding: clamp(20px, 4vw, 50px); 
      gap: clamp(15px, 2vw, 30px); 
      /* Tarjetas mínimas 280px, máximas 380px, escalan con la pantalla */
      grid-template-columns: repeat(auto-fit, minmax(280px, 380px)); 
      justify-content: center; 
      align-content: start;
      flex-grow: 1;
    }
    .modulo { 
      background: white; border-radius: 20px; 
      padding: clamp(20px, 3vw, 40px); 
      display: flex; flex-direction: column; align-items: center; gap: clamp(10px, 1.5vw, 20px); 
      text-decoration: none; border: 1px solid rgba(0,0,0,0.06); transition: 0.3s;
    }
    .modulo:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0,0,0,0.1); }
    
    /* Iconos y textos escalables */
    .modulo i { font-size: clamp(2.5rem, 4vw, 4rem) !important; color: var(--verde-os); }
    .mod-nombre { font-size: clamp(1rem, 1.5vw, 1.5rem); font-weight: 700; color: var(--carbon); }
    .mod-tag { font-size: clamp(0.6rem, 0.8vw, 0.9rem); color: var(--verde-os); font-weight: 800; text-transform: uppercase; letter-spacing: 0.2em; }
    
    /* BADGE */
    .badge-alert { position: absolute; top: 15px; right: 15px; background: #DC2626; color: white; width: clamp(18px, 2vw, 25px); height: clamp(18px, 2vw, 25px); border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: clamp(0.6rem, 0.5vw, 0.8rem); }
    .badge-alert.on { display: flex; }
  </style>
</head>
<body>

<div id="intro">
  <img src="/static/img/ecoltura-logo.png" alt="ECOLTURA">
  <h1>Administración</h1>
</div>

<header class="topbar">
  <a href="/menu" class="brand">
    <img src="/static/img/ecoltura-logo.png" alt="Logo">
    <span>ECOLTURA</span>
  </a>
</header>

<main class="modulos">
  <a href="/clientes" class="modulo"><i class="bi bi-people"></i><div class="mod-nombre">Clientes</div><div class="mod-tag">Gestión</div></a>
  <a href="/productos" class="modulo"><i class="bi bi-basket3"></i><div class="mod-nombre">Productos</div><div class="mod-tag">Catálogo</div></a>
  <a href="/inventario" class="modulo"><i class="bi bi-box-seam"></i><div class="mod-nombre">Inventario</div><div class="mod-tag">Stock</div></a>
  <a href="/ventas" class="modulo"><i class="bi bi-receipt-cutoff"></i><div class="mod-nombre">Ventas</div><div class="mod-tag">Facturación</div></a>
  <a href="/admin/pedidos" class="modulo" style="position:relative;">
    <span class="badge-alert" id="badgePedidos">!</span>
    <i class="bi bi-bag-check"></i>
    <div class="mod-nombre">Pedidos Web</div>
    <div class="mod-tag">Bandeja</div>
  </a>
  <a href="/admin/visitas" class="modulo"><i class="bi bi-calendar2-check"></i><div class="mod-nombre">Visitas</div><div class="mod-tag">Finca</div></a>
</main>

<script>
  if (sessionStorage.getItem('introMostrada')) {
    document.getElementById('intro').style.display = 'none';
  } else {
    setTimeout(() => {
      document.getElementById('intro').classList.add('hide');
      sessionStorage.setItem('introMostrada', 'true');
    }, 1800);
  }
  
  fetch('/admin/api/contadores').then(r => r.json()).then(d => {
    if (d.pedidos_pendientes > 0) document.getElementById('badgePedidos').classList.add('on');
  }).catch(() => {});
</script>
</body>
</html>
