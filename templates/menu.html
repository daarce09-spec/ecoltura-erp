<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ECOLTURA | Administración</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --verde:    #2E6B3E;
      --verde-os: #1A4226;
      --lima:     #7AB648;
      --crema:    #F4F7F0;
      --blanco:   #FFFFFF;
      --carbon:   #1C1C1E;
      --gris:     #6B7280;
      --borde:    rgba(46,107,62,.1);
    }

    html, body { height: 100%; margin: 0; }
    body { font-family: 'Inter', sans-serif; background: var(--crema); color: var(--carbon); }

    /* ── INTRO ── */
    #intro {
      position: fixed; inset: 0; z-index: 1000;
      background: var(--blanco);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      transition: opacity .5s ease, visibility .5s ease;
    }
    #intro.hide { opacity: 0; visibility: hidden; }
    #intro img { height: 120px; width: auto; margin-bottom: 20px; }

    /* ── LAYOUT ── */
    .shell { display: grid; grid-template-rows: 80px 1fr; height: 100vh; }
    
    .topbar {
      background: var(--blanco); border-bottom: 1px solid #eee;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 32px;
    }
    .topbar-brand { display: flex; align-items: center; gap: 12px; }
    .topbar-brand img { height: 35px; }
    .topbar-name { font-weight: 800; color: var(--verde-os); }

    /* ── GRID DE MÓDULOS ── */
    .modulos {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px; padding: 32px; align-content: start;
    }

    .modulo {
      background: var(--blanco);
      border-radius: 20px; border: 1px solid #eee;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 30px; text-decoration: none;
      transition: all 0.2s ease;
    }
    .modulo:hover { border-color: var(--verde); box-shadow: 0 8px 24px rgba(0,0,0,0.05); }

    .mod-icon { 
      font-size: 2.5rem; color: var(--verde); 
      margin-bottom: 15px; 
    }
    
    .mod-info { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .mod-nombre { font-weight: 700; color: var(--carbon); font-size: 1.1rem; }
    .mod-tag { font-size: 0.75rem; color: var(--gris); text-transform: uppercase; letter-spacing: 1px; }

    /* Responsive */
    @media (max-width: 520px) {
      .modulos { grid-template-columns: 1fr; padding: 16px; }
      .modulo { flex-direction: row; justify-content: flex-start; padding: 20px; gap: 20px; }
      .mod-info { align-items: flex-start; }
    }
  </style>
</head>
<body>

<div id="intro">
  <img src="/static/img/ecoltura-logo.png" alt="Logo">
  <div>Administración</div>
</div>

<div class="shell">
  <header class="topbar">
    <div class="topbar-brand">
      <img src="/static/img/ecoltura-logo.png" alt="Logo">
      <span class="topbar-name">ECOLTURA</span>
    </div>
  </header>

  <main class="modulos">
    <a href="/clientes" class="modulo">
      <div class="mod-icon"><i class="bi bi-people"></i></div>
      <div class="mod-info">
        <div class="mod-nombre">Clientes</div>
        <div class="mod-tag">Gestión</div>
      </div>
    </a>
    
    <a href="/productos" class="modulo">
      <div class="mod-icon"><i class="bi bi-basket3"></i></div>
      <div class="mod-info">
        <div class="mod-nombre">Productos</div>
        <div class="mod-tag">Catálogo</div>
      </div>
    </a>

    <a href="/inventario" class="modulo">
      <div class="mod-icon"><i class="bi bi-box-seam"></i></div>
      <div class="mod-info">
        <div class="mod-nombre">Inventario</div>
        <div class="mod-tag">Stock</div>
      </div>
    </a>

    <a href="/ventas" class="modulo">
      <div class="mod-icon"><i class="bi bi-receipt-cutoff"></i></div>
      <div class="mod-info">
        <div class="mod-nombre">Ventas</div>
        <div class="mod-tag">Facturación</div>
      </div>
    </a>

    <a href="/admin/pedidos" class="modulo">
      <div class="mod-icon"><i class="bi bi-bag-check"></i></div>
      <div class="mod-info">
        <div class="mod-nombre">Pedidos Web</div>
        <div class="mod-tag">Bandeja</div>
      </div>
    </a>

    <a href="/admin/visitas" class="modulo">
      <div class="mod-icon"><i class="bi bi-calendar2-check"></i></div>
      <div class="mod-info">
        <div class="mod-nombre">Visitas</div>
        <div class="mod-tag">Finca</div>
      </div>
    </a>
  </main>
</div>

<script>
  setTimeout(() => document.getElementById('intro').classList.add('hide'), 1500);
</script>
</body>
</html>
