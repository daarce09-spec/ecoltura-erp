<style>
    /* ... mantén tus variables :root igual ... */

    .modulos {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      padding: 32px;
      align-content: start;
    }

    .modulo {
      background: var(--blanco);
      border-radius: 20px;
      border: 1px solid var(--borde);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 30px;
      text-decoration: none;
      transition: all 0.3s ease;
      min-height: 200px; /* Asegura altura mínima uniforme */
    }

    .mod-info {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px; /* Espacio entre título y tag */
      margin-top: 15px;
    }

    .mod-nombre {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--carbon);
      line-height: 1.2;
    }

    .mod-tag {
      font-size: 0.75rem; /* Tamaño legible */
      color: var(--gris);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* Ajuste para móvil */
    @media (max-width: 520px) {
      .modulos { grid-template-columns: 1fr; padding: 16px; }
      .modulo { 
        flex-direction: row; 
        justify-content: flex-start; 
        padding: 20px; 
        min-height: auto;
      }
      .mod-info { align-items: flex-start; margin-top: 0; margin-left: 20px; }
    }
</style>

<main class="modulos">
    <a href="/clientes" class="modulo">
      <div class="mod-icon"><i class="bi bi-people"></i></div>
      <div class="mod-info">
        <div class="mod-nombre">Clientes</div>
        <div class="mod-tag">Gestión</div>
      </div>
    </a>
    </main>
