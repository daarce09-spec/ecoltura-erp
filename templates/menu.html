{% extends "base.html" %}
{% block content %}

<style>
  body {
    background: linear-gradient(135deg, #f0f7f0 0%, #fafdf8 100%) !important;
    font-family: 'Segoe UI', sans-serif;
    margin: 0; overflow-x: hidden;
  }

  .main-wrapper {
    min-height: 90vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 30px 20px;
    animation: fadeIn .8s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Logo compacto */
  .brand-header { display: flex; align-items: center; gap: 14px; margin-bottom: 8px; }
  .brand-header img { height: 52px; width: auto; }
  .brand-title {
    font-family: 'Segoe UI', sans-serif; font-size: 1.6rem;
    font-weight: 700; letter-spacing: 3px; color: #1b4332;
    text-transform: uppercase; line-height: 1;
  }
  .brand-sub {
    font-size: .65rem; letter-spacing: 2px; text-transform: uppercase;
    color: #5a9a72; font-weight: 600; margin-top: 3px;
  }
  .brand-divider {
    width: 48px; height: 2px;
    background: linear-gradient(to right, #6bbf6b, #a4c93c);
    border-radius: 2px; margin: 14px auto 36px;
  }

  /* Grid de tarjetas */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    width: 100%;
    max-width: 1100px;
  }

  .module-link { text-decoration: none; }

  .module-card {
    background: white;
    border-radius: 20px;
    padding: 36px 28px 30px;
    display: flex; flex-direction: column; align-items: center; gap: 12px;
    border: 1.5px solid rgba(107,191,107,.15);
    box-shadow: 0 2px 12px rgba(27,67,50,.06);
    transition: all .25s cubic-bezier(.16,1,.3,1);
    position: relative; overflow: hidden;
  }

  .module-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0;
    height: 3px; background: linear-gradient(to right, #6bbf6b, #a4c93c);
    transform: scaleX(0); transform-origin: left;
    transition: transform .25s ease;
  }

  .module-link:hover .module-card {
    transform: translateY(-6px);
    box-shadow: 0 16px 36px rgba(27,67,50,.14);
    border-color: rgba(107,191,107,.4);
  }
  .module-link:hover .module-card::before { transform: scaleX(1); }

  .icon-wrap {
    width: 76px; height: 76px; border-radius: 18px;
    background: #f0f7f0;
    display: flex; align-items: center; justify-content: center;
    transition: background .25s;
  }
  .module-link:hover .icon-wrap { background: #1b4332; }

  .icon-wrap i {
    font-size: 2.2rem; color: #2d6a4f;
    transition: color .25s;
  }
  .module-link:hover .icon-wrap i { color: white; }

  .module-name {
    font-size: 1.1rem; font-weight: 700; color: #1b4332;
    transition: color .25s; text-align: center;
  }
  .module-tag {
    font-size: .65rem; color: #aaa; text-transform: uppercase;
    letter-spacing: 1.5px; font-weight: 600;
  }

  /* Badge de pendientes */
  .badge-dot {
    position: absolute; top: 14px; right: 14px;
    background: #e74c3c; color: white; border-radius: 999px;
    min-width: 22px; height: 22px; padding: 0 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: .7rem; font-weight: 700;
  }
  .badge-dot.oculto { display: none; }

  @media (max-width: 640px) {
    .cards-grid { grid-template-columns: repeat(2, 1fr); }
    .brand-header img { height: 42px; }
    .brand-title { font-size: 1.3rem; }
  }
  @media (max-width: 380px) {
    .cards-grid { grid-template-columns: 1fr; }
  }
</style>

<div class="main-wrapper">

  <!-- Brand -->
  <div class="brand-header">
    <img src="{{ url_for('static', filename='img/ecoltura-logo.png') }}" alt="ECOLTURA">
    <div>
      <div class="brand-title">ECOLTURA</div>
      <div class="brand-sub">Productos Orgánicos & Lácteos</div>
    </div>
  </div>
  <div class="brand-divider"></div>

  <!-- Módulos -->
  <div class="cards-grid">

    <a href="{{ url_for('clientes_bp.clientes') }}" class="module-link">
      <div class="module-card">
        <div class="icon-wrap"><i class="bi bi-people"></i></div>
        <div class="module-name">Clientes</div>
        <div class="module-tag">Gestión</div>
      </div>
    </a>

    <a href="{{ url_for('productos_bp.productos') }}" class="module-link">
      <div class="module-card">
        <div class="icon-wrap"><i class="bi bi-basket3"></i></div>
        <div class="module-name">Productos</div>
        <div class="module-tag">Catálogo</div>
      </div>
    </a>

    <a href="{{ url_for('inventario_bp.inventario_menu') }}" class="module-link">
      <div class="module-card">
        <div class="icon-wrap"><i class="bi bi-box-seam"></i></div>
        <div class="module-name">Inventario</div>
        <div class="module-tag">Stock</div>
      </div>
    </a>

    <a href="{{ url_for('ventas_bp.ventas_menu') }}" class="module-link">
      <div class="module-card">
        <div class="icon-wrap"><i class="bi bi-receipt-cutoff"></i></div>
        <div class="module-name">Ventas</div>
        <div class="module-tag">Facturación</div>
      </div>
    </a>

    <a href="/admin/pedidos" class="module-link">
      <div class="module-card">
        <span class="badge-dot oculto" id="badgePedidos">0</span>
        <div class="icon-wrap"><i class="bi bi-bag-check"></i></div>
        <div class="module-name">Pedidos Web</div>
        <div class="module-tag">Bandeja</div>
      </div>
    </a>

    <a href="/admin/visitas" class="module-link">
      <div class="module-card">
        <span class="badge-dot oculto" id="badgeVisitas">0</span>
        <div class="icon-wrap"><i class="bi bi-calendar2-check"></i></div>
        <div class="module-name">Visitas</div>
        <div class="module-tag">Finca</div>
      </div>
    </a>

  </div>
</div>

<script>
(async function() {
  try {
    const d = await fetch("/admin/api/contadores").then(r => r.json());
    const bp = document.getElementById("badgePedidos");
    const bv = document.getElementById("badgeVisitas");
    if (d.pedidos_pendientes > 0) { bp.textContent = d.pedidos_pendientes; bp.classList.remove("oculto"); }
    if (d.visitas_pendientes > 0) { bv.textContent = d.visitas_pendientes; bv.classList.remove("oculto"); }
  } catch(e) {}
})();
</script>

{% endblock %}
